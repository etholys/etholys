<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Etholys — Chat IA</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    body { max-width: 720px; margin: 0 auto; padding: 1rem; min-height: 100vh; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    a { color: #7dd3fc; }
    #log {
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      min-height: 280px;
      max-height: 50vh;
      overflow-y: auto;
      background: #1e293b;
      margin: 1rem 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg { margin-bottom: 0.75rem; }
    .msg.user { color: #86efac; }
    .msg.assistant { color: #e2e8f0; }
    .meta { font-size: 0.75rem; color: #94a3b8; margin-bottom: 1rem; }
    textarea {
      width: 100%;
      min-height: 72px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #1e293b;
      color: #f8fafc;
      padding: 0.5rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 0.5rem;
      background: #0ea5e9;
      color: #0f172a;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err { color: #fca5a5; }
  </style>
</head>
<body>
  <h1>Etholys — Chat com IA</h1>
  <p class="meta">
    Cada mensagem é gravada no PostgreSQL.
    <a href="/docs">API docs</a> ·
    <a href="#" id="newChat">Nova conversa</a>
  </p>
  <p class="meta" id="cidLine">Conversa: (nova)</p>
  <div id="log"></div>
  <textarea id="input" placeholder="Escreva sua mensagem…"></textarea>
  <button type="button" id="send">Enviar</button>
  <p id="status" class="meta"></p>

  <script>
    const logEl = document.getElementById("log");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const statusEl = document.getElementById("status");
    const cidLine = document.getElementById("cidLine");

    let conversationId = null;

    function append(role, text) {
      const d = document.createElement("div");
      d.className = "msg " + role;
      d.textContent = (role === "user" ? "Você: " : "IA: ") + text;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setCid(id) {
      conversationId = id;
      cidLine.textContent = id ? "Conversa: " + id : "Conversa: (nova)";
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      sendBtn.disabled = true;
      statusEl.textContent = "";
      statusEl.className = "meta";
      append("user", text);
      inputEl.value = "";

      try {
        const body = { message: text };
        if (conversationId) body.conversation_id = conversationId;

        const res = await fetch("/ai/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.detail || res.statusText || "Erro na API");
        }

        setCid(data.conversation_id);
        append("assistant", data.reply);
        statusEl.textContent = "Modelo: " + (data.model || "?");
      } catch (e) {
        const p = document.createElement("div");
        p.className = "msg err";
        p.textContent = "Erro: " + e.message;
        logEl.appendChild(p);
        statusEl.textContent = e.message;
        statusEl.className = "meta err";
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter" && !ev.shiftKey) {
        ev.preventDefault();
        send();
      }
    });

    document.getElementById("newChat").addEventListener("click", (ev) => {
      ev.preventDefault();
      logEl.innerHTML = "";
      setCid(null);
      statusEl.textContent = "";
    });
  </script>
</body>
</html>
