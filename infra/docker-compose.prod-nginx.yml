# Produção com Nginx já nas portas 80/443 (sem Caddy).
# Web só em localhost:3000 — Nginx faz proxy para forge.etholys.com
#
# docker compose -f docker-compose.prod-nginx.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: etholys-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-etholys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-etholys}
    volumes:
      - etholys_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-etholys} -d ${POSTGRES_DB:-etholys}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - etholys

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: etholys-web-prod
    restart: unless-stopped
    env_file:
      - ../apps/web/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-etholys}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-etholys}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      JITSI_BASE_URL: ${JITSI_BASE_URL:-https://meet.forge.etholys.com}
    ports:
      - '127.0.0.1:3001:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etholys

volumes:
  etholys_pgdata_prod:

networks:
  etholys:
    driver: bridge
