# Ollama: opcional (não é necessário para LLM — a app usa Google Gemini a partir do .env).
# Para ativar: docker compose --profile ollama up -d
services:
  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    container_name: etholys-ollama
    restart: unless-stopped
    volumes:
      - etholys_ollama:/root/.ollama
    # Sem "ports": não ocupa a 11434 do Windows (se você tiver Ollama no PC).

  postgres:
    image: postgres:16-alpine
    container_name: etholys-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: etholys
      POSTGRES_PASSWORD: etholys_dev_change_me
      POSTGRES_DB: etholys
    ports:
      - "5433:5432"
    volumes:
      - etholys_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etholys -d etholys"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: etholys-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../etholys-web/nextjs_space/.env
    environment:
      DATABASE_URL: postgresql://etholys:etholys_dev_change_me@postgres:5432/etholys
      # AI_PROVIDER, GEMINI_*, OPENAI_* vêm do env_file (nextjs_space/.env)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:20-bookworm-slim
    container_name: etholys-nextjs
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - ../etholys-web/nextjs_space/.env
    environment:
      DATABASE_URL: postgresql://etholys:etholys_dev_change_me@postgres:5432/etholys
      # Obrigatório para sessões/login; sem isto o site parece “não funcionar”.
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-etholys-nextauth-mude-em-producao}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
      # Gemini: GEMINI_API_KEY, GEMINI_MODEL, GEMINI_MAX_OUTPUT_TOKENS no env_file (.env)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Forzamos a Next.js a escuchar en todas las interfaces y en el puerto 3000
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    volumes:
      - ../etholys-web/nextjs_space:/app
      - etholys_web_node_modules:/app/node_modules
    # Apaga o client Prisma gerado antigo (volume node_modules) antes de gerar de novo — evita "Unknown argument budgetFlow".
    # Agregamos npx prisma db push para asegurar que las tablas existan en la BD antes de arrancar.
    command: >
      sh -c "npm install --legacy-peer-deps && rm -rf node_modules/.prisma && npx prisma generate && npx prisma db push && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  etholys_pgdata:
  etholys_web_node_modules:
  etholys_ollama:
