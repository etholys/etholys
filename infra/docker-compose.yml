# Ollama: opcional (não é necessário para LLM — a app usa Google Gemini a partir do .env).
# Para ativar: docker compose --profile ollama up -d
services:
  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    container_name: etholys-ollama
    restart: unless-stopped
    volumes:
      - etholys_ollama:/root/.ollama
    # Sem "ports": não ocupa a 11434 do Windows (se você tiver Ollama no PC).

  postgres:
    image: postgres:16-alpine
    container_name: etholys-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: etholys
      POSTGRES_PASSWORD: etholys_dev_change_me
      POSTGRES_DB: etholys
    ports:
      - "5433:5432"
    volumes:
      - etholys_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etholys -d etholys"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: etholys-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../apps/web/.env
    environment:
      DATABASE_URL: postgresql://etholys:etholys_dev_change_me@postgres:5432/etholys
      # AI_PROVIDER, GEMINI_*, OPENAI_* vêm do env_file (apps/web/.env)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  web:
    # bookworm (não slim): Prisma precisa de OpenSSL no contentor.
    image: node:20-bookworm
    container_name: etholys-nextjs
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - ../apps/web/.env
    environment:
      DATABASE_URL: postgresql://etholys:etholys_dev_change_me@postgres:5432/etholys
      # Obrigatório para sessões/login; sem isto o site parece “não funcionar”.
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-etholys-nextauth-mude-em-producao}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
      # Gemini: GEMINI_API_KEY, GEMINI_MODEL, GEMINI_MAX_OUTPUT_TOKENS no env_file (.env)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Forzamos a Next.js a escuchar en todas las interfaces y en el puerto 3000
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      ETHOLYS_WEB_ROOT: /app
      IN_DOCKER: "1"
    volumes:
      - ../apps/web:/app
      - etholys_web_node_modules:/app/node_modules
      # .next fora do bind mount (evita OneDrive/Windows a partirem ficheiros a meio → ENOENT em react-loadable-manifest.json e 500).
      - etholys_next_cache:/app/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/forge/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    command:
      - sh
      - -c
      - |
        set -e
        cd /app
        npm install --legacy-peer-deps
        rm -rf node_modules/.prisma
        npx prisma generate
        if ! node scripts/verify-forge-prisma.mjs 2>/dev/null; then
          echo "[docker-web] Prisma FORGE em falta — reinstalar @prisma/client..."
          rm -rf node_modules/.prisma node_modules/@prisma/client
          npm install @prisma/client@6.7.0 prisma@6.7.0 --legacy-peer-deps
          npx prisma generate
          node scripts/verify-forge-prisma.mjs
        fi
        npx prisma migrate deploy
        exec npx next dev -H 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  etholys_pgdata:
  etholys_web_node_modules:
  etholys_next_cache:
  etholys_ollama:
